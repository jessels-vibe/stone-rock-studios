<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stone Rock Studios</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<meta name="description" content="Stone Rock Studios — creative video production in Los Angeles.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://stonerockstudios.xyz">
<meta property="og:title" content="Stone Rock Studios">

<meta property="og:image" content="https://stonerockstudios.xyz/og-image.png">
<meta name="twitter:card" content="summary_large_image">

<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    background: #0a0a0a;
    color: #fefefe;
    font-family: "Helvetica Neue", Helvetica, 'Inter', Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 40px 24px;
    text-align: center;
  }
  .logo {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: #fefefe;
    margin-bottom: 48px;
  }
  .headline {
    font-size: clamp(36px, 8vw, 80px);
    font-weight: 700;
    letter-spacing: -0.03em;
    line-height: 0.92;
    color: #fefefe;
    margin-bottom: 28px;
  }
  .sub {
    font-size: 13px;
    font-weight: 300;
    color: #555;
    letter-spacing: 0.06em;
    margin-bottom: 56px;
  }
  .shop-link {
    display: inline-block;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #444;
    text-decoration: none;
    border-bottom: 1px solid #222;
    padding-bottom: 3px;
    transition: color 0.2s, border-color 0.2s;
  }
  .shop-link:hover {
    color: #fefefe;
    border-color: #fefefe;
  }
</style>
</head>
<body>
  <div class="logo">Stone Rock Studios</div>
  <div class="headline">Coming<br>Soon</div>
  <div class="sub">Something is in the works.</div>
  <a class="shop-link" href="shop.html">Visit the Shop</a>
</body>
</html>
