<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop — Stone Rock Studios</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<meta name="description" content="Stone Rock Studios Merch — film crew tees for every department. For your cast and crew.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://stonerockstudios.xyz/shop.html">
<meta property="og:title" content="Shop — Stone Rock Studios">
<meta property="og:description" content="Film crew tees for every department. For your cast and crew.">
<meta property="og:image" content="https://stonerockstudios.xyz/og-image.png">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Shop — Stone Rock Studios">
<meta name="twitter:description" content="Film crew tees for every department. For your cast and crew.">
<meta name="twitter:image" content="https://stonerockstudios.xyz/og-image.png">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  button, input, select, textarea { font-family: inherit; }
  :root {
    --black: #0a0a0a; --surface: #111; --surface2: #181818;
    --border: #1e1e1e; --text: #f0f0f0; --muted: #555; --gap: 3px;
  }
  html { background: var(--black); color: var(--text); font-family: "Helvetica Neue", Helvetica, 'Inter', Arial, sans-serif; -webkit-font-smoothing: antialiased; }

  /* NAV */
  nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 0 32px; height: 52px; background: rgba(10,10,10,0.96); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); }
  .nav-logo { font-weight: 700; font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text); text-decoration: none; }
  .nav-links { display: flex; gap: 40px; align-items: center; }
  .nav-link { font-size: 11px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); text-decoration: none; transition: color 0.2s; }
  .nav-link:hover, .nav-link.active { color: var(--text); }
  .nav-cta { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--black); background: var(--text); padding: 7px 16px; text-decoration: none; transition: opacity 0.2s; }
  .nav-cta:hover { opacity: 0.8; }
  .cart-btn { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 11px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; font-family: inherit; display: flex; align-items: center; gap: 7px; transition: color 0.2s; }
  .cart-btn:hover { color: var(--text); }
  .cart-badge { background: #fefefe; color: var(--black); font-size: 9px; font-weight: 700; min-width: 16px; height: 16px; padding: 0 4px; border-radius: 8px; display: none; align-items: center; justify-content: center; }
  .cart-badge.show { display: flex; }

  /* HERO */
  .hero { padding: 120px 36px 48px; }
  .hero-label { font-size: 10px; font-weight: 600; letter-spacing: 0.25em; text-transform: uppercase; color: #fefefe; margin-bottom: 18px; }
  .hero-title { font-weight: 700; font-size: clamp(48px, 7vw, 88px); line-height: 0.92; letter-spacing: -0.03em; color: var(--text); margin-bottom: 14px; }
  .hero-sub { font-size: 13px; font-weight: 300; color: #fefefe; letter-spacing: 0.06em; }

  /* GRID */
  .shop-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--gap); }
  .product-tile { cursor: pointer; background: var(--surface); overflow: hidden; }
  .tile-img-wrap { position: relative; padding-bottom: 100%; background: var(--surface2); overflow: hidden; }
  .tile-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.7s cubic-bezier(0.25,0.46,0.45,0.94); }
  .product-tile:hover .tile-img { transform: scale(1.04); }
  .tile-no-img { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: #fefefe; }
  .tile-info { padding: 14px 16px 18px; }
  .tile-title { font-size: 13px; font-weight: 600; color: #fefefe; margin-bottom: 5px; line-height: 1.3; }
  .tile-price { display: none; }
  .status-msg { grid-column: 1/-1; padding: 80px 32px; font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: #fefefe; text-align: center; }
  /* SHOP LAYOUT */
  .shop-layout { display: flex; align-items: flex-start; }
  .dept-sidebar { width: 158px; flex-shrink: 0; position: sticky; top: 52px; height: calc(100vh - 52px); overflow-y: auto; border-right: 1px solid var(--border); padding: 20px 0; }
  .dept-sidebar::-webkit-scrollbar { display: none; }
  .sidebar-link { display: block; font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); text-decoration: none; padding: 8px 20px; margin-bottom: 1px; transition: color 0.15s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; border-left: 2px solid transparent; }
  .sidebar-link:hover { color: #fefefe; }
  .sidebar-link.active { color: #fefefe; border-left-color: #fefefe; }
  .shop-main { flex: 1; min-width: 0; padding-bottom: 100px; }
  .featured-wrap { padding-bottom: 12px; }
  .section-label { font-size: 10px; font-weight: 600; letter-spacing: 0.25em; text-transform: uppercase; color: var(--muted); padding: 32px var(--gap) 14px; }
  .dept-section { padding-bottom: 12px; }
  .dept-header { display: flex; align-items: baseline; gap: 10px; padding: 36px var(--gap) 14px; border-top: 1px solid var(--border); }
  .dept-header-name { font-size: 10px; font-weight: 600; letter-spacing: 0.25em; text-transform: uppercase; color: #fefefe; }
  .dept-header-count { font-size: 10px; color: var(--muted); }

  /* PRODUCT MODAL */
  .modal-back { position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.92); display: flex; align-items: center; justify-content: center; padding: 24px; opacity: 0; pointer-events: none; transition: opacity 0.25s; }
  .modal-back.open { opacity: 1; pointer-events: all; }
  .modal-box { background: var(--surface); width: 100%; max-width: 880px; max-height: 88vh; display: flex; overflow: hidden; transform: scale(0.97); transition: transform 0.25s; position: relative; }
  .modal-back.open .modal-box { transform: scale(1); }
  .modal-close { position: absolute; top: 14px; right: 16px; background: none; border: none; color: #fefefe; font-size: 18px; cursor: pointer; z-index: 10; transition: color 0.2s; font-family: inherit; line-height: 1; }
  .modal-close:hover { color: #fefefe; }

  /* Image pane */
  .modal-img-pane { width: 48%; flex-shrink: 0; position: relative; background: var(--black); display: flex; align-items: center; justify-content: center; }
  .modal-main-img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .modal-arrow { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.55); border: none; color: #fefefe; width: 34px; height: 34px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 15px; opacity: 0; transition: opacity 0.2s; z-index: 2; }
  .modal-img-pane:hover .modal-arrow { opacity: 1; }
  .modal-arrow.prev { left: 10px; }
  .modal-arrow.next { right: 10px; }
  .modal-arrow:disabled { opacity: 0 !important; pointer-events: none; }
  .modal-dots { position: absolute; bottom: 12px; left: 0; right: 0; display: flex; justify-content: center; gap: 5px; }
  .modal-dot { width: 5px; height: 5px; border-radius: 50%; background: rgba(255,255,255,0.25); border: none; cursor: pointer; padding: 0; transition: background 0.2s; }
  .modal-dot.on { background: rgba(255,255,255,0.9); }

  /* Details pane */
  .modal-detail { flex: 1; padding: 40px 32px 32px; overflow-y: auto; display: flex; flex-direction: column; min-height: 0; }
  .modal-col-label { font-size: 9px; font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase; color: #fefefe; margin-bottom: 10px; }
  .modal-title { font-size: 24px; font-weight: 700; letter-spacing: -0.02em; color: #fefefe; line-height: 1.1; margin-bottom: 8px; }
  .modal-price { font-size: 16px; color: #fefefe; font-weight: 300; margin-bottom: 28px; }

  /* Options */
  .opt-group { margin-bottom: 22px; }
  .opt-label { font-size: 9px; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; color: #fefefe; margin-bottom: 10px; display: flex; gap: 8px; align-items: baseline; }
  .opt-selected-val { font-size: 11px; color: #fefefe; font-weight: 400; letter-spacing: 0; text-transform: none; }
  .opt-pills { display: flex; flex-wrap: wrap; gap: 6px; }
  .opt-pill { padding: 7px 13px; font-size: 11px; font-weight: 500; letter-spacing: 0.04em; border: 1px solid var(--border); color: #fefefe; background: transparent; cursor: pointer; font-family: inherit; transition: border-color 0.15s, color 0.15s; }
  .opt-pill:hover { border-color: #444; color: #fefefe; }
  .opt-pill.on { border-color: #fefefe; color: #fefefe; }
  .opt-pill.oos { opacity: 0.25; cursor: not-allowed; text-decoration: line-through; }
  .color-dot { width: 26px; height: 26px; border-radius: 50%; border: none; cursor: pointer; outline: 2px solid transparent; outline-offset: 3px; transition: outline-color 0.15s; flex-shrink: 0; }
  .color-dot.on { outline-color: #fefefe; }
  .color-dot.oos { opacity: 0.2; cursor: not-allowed; }
  .color-dot.light { box-shadow: 0 0 0 1px #333 inset; }

  /* Qty + ATC */
  .qty-row { display: flex; align-items: stretch; gap: 0; margin-bottom: 16px; width: fit-content; }
  .qty-btn { width: 36px; background: var(--surface2); border: 1px solid var(--border); color: #fefefe; font-size: 16px; cursor: pointer; font-family: inherit; transition: background 0.15s; }
  .qty-btn:hover { background: #222; }
  .qty-num { width: 46px; background: transparent; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); border-left: none; border-right: none; color: #fefefe; font-size: 13px; text-align: center; font-family: inherit; display: flex; align-items: center; justify-content: center; }
  .atc-btn { width: 100%; padding: 15px; background: #fefefe; color: var(--black); border: none; font-size: 12px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; cursor: pointer; font-family: inherit; transition: opacity 0.2s; margin-top: auto; }
  .atc-btn:hover { opacity: 0.85; }
  .atc-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .atc-note { font-size: 11px; color: #fefefe; text-align: center; margin-top: 10px; min-height: 14px; }

  /* CART DRAWER */
  .cart-overlay { position: fixed; inset: 0; z-index: 300; background: rgba(0,0,0,0.55); opacity: 0; pointer-events: none; transition: opacity 0.25s; }
  .cart-overlay.open { opacity: 1; pointer-events: all; }
  .cart-drawer { position: fixed; top: 0; right: 0; bottom: 0; z-index: 301; width: 360px; max-width: 100vw; background: var(--surface); border-left: 1px solid var(--border); display: flex; flex-direction: column; transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.25,0.46,0.45,0.94); }
  .cart-drawer.open { transform: none; }
  .cart-head { padding: 18px 22px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .cart-head-title { font-size: 11px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; }
  .cart-x { background: none; border: none; color: #fefefe; font-size: 17px; cursor: pointer; font-family: inherit; transition: color 0.2s; }
  .cart-x:hover { color: #fefefe; }
  .cart-list { flex: 1; overflow-y: auto; }
  .cart-empty-msg { padding: 60px 22px; text-align: center; font-size: 11px; color: #fefefe; letter-spacing: 0.12em; text-transform: uppercase; }
  .cart-item { display: flex; gap: 14px; padding: 16px 22px; border-bottom: 1px solid var(--border); }
  .cart-item-img-wrap { width: 68px; height: 68px; flex-shrink: 0; overflow: hidden; background: var(--black); }
  .cart-item-img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.35s cubic-bezier(0.25,0.46,0.45,0.94); }
  .cart-item:hover .cart-item-img { transform: scale(1.08); }
  .cart-item-body { flex: 1; min-width: 0; }
  .cart-item-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
  .cart-item-name { font-size: 12px; font-weight: 600; color: #fefefe; line-height: 1.3; }
  .cart-item-variant { font-size: 11px; color: #fefefe; margin-top: 3px; }
  .cart-item-price { font-size: 12px; color: #fefefe; margin-left: auto; flex-shrink: 0; }
  .cart-remove { background: none; border: none; color: var(--muted); font-size: 13px; cursor: pointer; padding: 0; line-height: 1; transition: color 0.2s; flex-shrink: 0; margin-top: 1px; }
  .cart-remove:hover { color: #fefefe; }
  .cart-variant-sel { background: var(--surface2); border: 1px solid var(--border); color: #fefefe; font-size: 10px; letter-spacing: 0.04em; font-family: inherit; padding: 4px 6px; cursor: pointer; width: 100%; margin-top: 6px; }
  .cart-item-controls { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
  .cart-qty-btn { width: 24px; height: 24px; background: var(--surface2); border: 1px solid var(--border); color: #fefefe; font-size: 14px; cursor: pointer; font-family: inherit; display: flex; align-items: center; justify-content: center; transition: background 0.15s; flex-shrink: 0; padding: 0; }
  .cart-qty-btn:hover { background: #222; }
  .cart-qty-num { font-size: 12px; color: #fefefe; min-width: 18px; text-align: center; }
  .cart-foot { padding: 18px 22px; border-top: 1px solid var(--border); flex-shrink: 0; }
  .cart-sub-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 14px; }
  .cart-sub-label { font-size: 10px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: #fefefe; }
  .cart-sub-amt { font-size: 16px; font-weight: 600; color: #fefefe; }
  .checkout-link { display: block; width: 100%; padding: 15px; background: #fefefe; color: var(--black); border: none; font-size: 12px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; text-align: center; text-decoration: none; cursor: pointer; transition: opacity 0.2s; }
  .checkout-link:hover { opacity: 0.85; }

  /* CART NOTE, DISCOUNT, TAX */
  .cart-note-wrap { margin-bottom: 12px; }
  .cart-note-area { width: 100%; background: var(--surface2); border: 1px solid var(--border); color: #fefefe; font-size: 11px; font-family: inherit; padding: 8px 10px; resize: none; line-height: 1.5; outline: none; }
  .cart-note-area::placeholder { color: var(--muted); }
  .cart-note-area:focus { border-color: #333; }
  .cart-discount-row { display: flex; gap: 6px; margin-bottom: 8px; }
  .cart-discount-input { flex: 1; background: var(--surface2); border: 1px solid var(--border); color: #fefefe; font-size: 11px; font-family: inherit; padding: 7px 10px; outline: none; letter-spacing: 0.06em; text-transform: uppercase; }
  .cart-discount-input::placeholder { color: var(--muted); text-transform: none; letter-spacing: 0; }
  .cart-discount-input:focus { border-color: #333; }
  .cart-discount-btn { background: var(--surface2); border: 1px solid var(--border); color: #fefefe; font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; font-family: inherit; padding: 0 12px; cursor: pointer; white-space: nowrap; transition: background 0.15s; }
  .cart-discount-btn:hover { background: #222; }
  .cart-discount-applied { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; padding: 6px 10px; background: #0d1f0d; border: 1px solid #1a3a1a; }
  .cart-discount-code { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: #6abf6a; }
  .cart-discount-remove { background: none; border: none; color: #6abf6a; font-size: 12px; cursor: pointer; padding: 0; opacity: 0.7; transition: opacity 0.2s; }
  .cart-discount-remove:hover { opacity: 1; }
  .cart-discount-err { font-size: 10px; color: #c0392b; margin-bottom: 8px; letter-spacing: 0.04em; }
  .cart-tax-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
  .cart-tax-label { font-size: 10px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }
  .cart-tax-amt { font-size: 12px; color: var(--muted); }
  .cart-total-row { display: flex; justify-content: space-between; align-items: baseline; margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); margin-bottom: 14px; }
  .cart-total-label { font-size: 10px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: #fefefe; }
  .cart-total-amt { font-size: 18px; font-weight: 700; color: #fefefe; }

  /* TILE SOLD-OUT */
  .tile-sold-out .tile-img { opacity: 0.35; }
  .tile-oos-label { font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-top: 4px; }
  .tile-most-popular { font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; color: #fefefe; margin-top: 4px; }

  /* BADGE POP */
  @keyframes badge-pop { 0%{transform:scale(1)} 45%{transform:scale(1.55)} 100%{transform:scale(1)} }
  .cart-badge.pop { animation: badge-pop 0.35s cubic-bezier(0.34,1.56,0.64,1); }

  @media (max-width: 1024px) { .shop-grid { grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 768px) {
    nav { padding: 0 20px; }
    .hero { padding: 90px 20px 40px; }
    .shop-grid { grid-template-columns: repeat(2, 1fr); }
    .modal-box { flex-direction: column; max-height: 92vh; }
    .modal-img-pane { width: 100%; height: 52vw; }
    .modal-detail { padding: 24px 20px 20px; }
    .shop-layout { flex-direction: column; }
    .dept-sidebar { width: 100%; height: auto; overflow-x: auto; overflow-y: hidden; border-right: none; border-bottom: 1px solid var(--border); padding: 0; display: flex; flex-direction: row; background: var(--black); z-index: 90; }
    .sidebar-link { border-left: none; border-bottom: 2px solid transparent; padding: 10px 14px; margin-bottom: 0; flex-shrink: 0; }
    .sidebar-link.active { border-left-color: transparent; border-bottom-color: #fefefe; }
  }
  @media (max-width: 480px) { .shop-grid { grid-template-columns: repeat(2, 1fr); } }
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="index.html">Stone Rock Studios</a>
  <div class="nav-links">
    <a class="nav-link" href="index.html">Work</a>
    <a class="nav-link active" href="shop.html">Shop</a>
    <button class="cart-btn" id="cartBtn">Bag <span class="cart-badge" id="cartBadge">0</span></button>
    <a class="nav-cta" href="mailto:stonerockstudiosllc@gmail.com">Get in Touch</a>
  </div>
</nav>

<div class="hero">
  <div class="hero-label">Merch</div>
  <div class="hero-title">Stone Rock<br>Studios</div>
  <div class="hero-sub">For your cast and crew.</div>
</div>

<div class="shop-layout">
  <aside class="dept-sidebar" id="deptSidebar"></aside>
  <div class="shop-main">
    <div class="featured-wrap" id="featuredWrap">
      <div class="section-label">Best Selling</div>
      <div class="shop-grid" id="featuredGrid"></div>
    </div>
    <div id="shopSections"><div class="status-msg">Loading</div></div>
  </div>
</div>

<!-- Product Modal -->
<div class="modal-back" id="productModal">
  <div class="modal-box">
    <button class="modal-close" id="modalClose">✕</button>

    <div class="modal-img-pane" id="imgPane">
      <img class="modal-main-img" id="modalImg" src="" alt="">
      <button class="modal-arrow prev" id="imgPrev">&#8592;</button>
      <button class="modal-arrow next" id="imgNext">&#8594;</button>
      <div class="modal-dots" id="imgDots"></div>
    </div>

    <div class="modal-detail">
      <div class="modal-col-label">Film Pieces</div>
      <div class="modal-title" id="modalTitle"></div>
      <div class="modal-price" id="modalPrice"></div>
      <div id="modalOpts"></div>
      <div class="qty-row">
        <button class="qty-btn" id="qtyMinus">−</button>
        <div class="qty-num" id="qtyNum">1</div>
        <button class="qty-btn" id="qtyPlus">+</button>
      </div>
      <button class="atc-btn" id="atcBtn">Add to Cart</button>
      <div class="atc-note" id="atcNote"></div>
    </div>
  </div>
</div>

<!-- Cart Drawer -->
<div class="cart-overlay" id="cartOverlay"></div>
<div class="cart-drawer" id="cartDrawer">
  <div class="cart-head">
    <span class="cart-head-title">Your Bag</span>
    <button class="cart-x" id="cartClose">✕</button>
  </div>
  <div class="cart-list" id="cartList">
    <div class="cart-empty-msg">Your bag is empty.</div>
  </div>
  <div class="cart-foot" id="cartFoot" style="display:none">
    <div class="cart-note-wrap">
      <textarea class="cart-note-area" id="cartNote" placeholder="Order note or gift message..." rows="2" maxlength="500"></textarea>
    </div>
    <div class="cart-discount-row">
      <input class="cart-discount-input" id="discountInput" type="text" placeholder="Discount code" autocomplete="off" spellcheck="false">
      <button class="cart-discount-btn" id="discountApply">Apply</button>
    </div>
    <div class="cart-discount-applied" id="discountApplied" style="display:none">
      <span class="cart-discount-code" id="discountAppliedText"></span>
      <button class="cart-discount-remove" id="discountRemove">✕</button>
    </div>
    <div class="cart-discount-err" id="discountErr" style="display:none"></div>
    <div class="cart-sub-row">
      <span class="cart-sub-label">Subtotal</span>
      <span class="cart-sub-amt" id="cartSubtotal"></span>
    </div>
    <div class="cart-tax-row" id="cartTaxRow" style="display:none">
      <span class="cart-tax-label">Est. Tax</span>
      <span class="cart-tax-amt" id="cartTax"></span>
    </div>
    <div class="cart-total-row" id="cartTotalRow" style="display:none">
      <span class="cart-total-label">Total</span>
      <span class="cart-total-amt" id="cartTotal"></span>
    </div>
    <a class="checkout-link" id="checkoutLink" href="#" target="_blank">Checkout</a>
  </div>
</div>

<script>

const COL   = 'gid://shopify/Collection/668068118818';

const COLOR_HEX = {
  'black':'#111','white':'#f5f5f5','navy':'#1a2744','red':'#cc2200','grey':'#888',
  'gray':'#888','heather grey':'#9b9b9b','heather gray':'#9b9b9b','forest green':'#228b22',

  'charcoal':'#333','sand':'#c8a96e','sage':'#6b8c6b','burgundy':'#6b0f1a',
  'athletic heather':'#b0b0b0','sport grey':'#999','dark heather':'#555',
};
const LIGHT = new Set(['white','cream','yellow','gold','tan','sand']);

async function gql(query, variables = {}) {
  const r = await fetch(API, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-Shopify-Storefront-Access-Token': TOKEN },
    body: JSON.stringify({ query, variables }),
  });
  return r.json();
}

function money(amount, currency = 'USD') {
  return new Intl.NumberFormat('en-US', { style: 'currency', currency }).format(amount);
}

// ── PRODUCTS ──────────────────────────────────────
let products = [];

async function fetchProducts() {
  const { data } = await gql(`{
    collection(id: "${COL}") {
      products(first: 100) {
        edges { node {
          id title productType
          featuredImage { url altText }
          images(first: 8) { edges { node { url altText } } }
          priceRange { minVariantPrice { amount currencyCode } }
          options { id name values }
          variants(first: 100) { edges { node {
            id title availableForSale quantityAvailable
            price { amount currencyCode }
            selectedOptions { name value }
            image { url }
          }}}
        }}
      }
    }
  }`);
  if (!data?.collection) return;
  products = data.collection.products.edges.map(({ node: p }) => ({
    ...p,
    images:     p.images.edges.map(e => e.node),
    variants:   p.variants.edges.map(e => e.node),
    department: TITLE_DEPT[p.title] || p.productType || '',
  }));
}

  'Craft Services & Catering','Medical & Safety',

];

// Featured pool — 4 shown daily, rotating from this list
const FEATURED_POOL = [
  'Director Tee',
  'Intimacy Coordinator Tee',
  'Grip (Upside Down) Tee',
  'PA Tee',
  'Best Boy Tee',
  'Publicist Tee',
];

function getDailyFeatured() {
  const day  = Math.floor(Date.now() / 86400000);
  const pool = FEATURED_POOL.map(t => products.find(p => p.title === t)).filter(Boolean);
  const sorted = [...pool].sort((a, b) => {
    const ha = Math.sin((day + pool.indexOf(a) + 1) * 127.1) * 43758.5453;
    const hb = Math.sin((day + pool.indexOf(b) + 1) * 127.1) * 43758.5453;
    return (ha - Math.floor(ha)) - (hb - Math.floor(hb));
  });
  return sorted.slice(0, 4);
}

function tileHTML(p, mostPopular = false) {
  const i = products.indexOf(p);
  const img = p.featuredImage?.url;
  const allSoldOut = p.variants.every(v => !v.availableForSale);
  return `<div class="product-tile${allSoldOut ? ' tile-sold-out' : ''}" onclick="openModal(${i})">
    <div class="tile-img-wrap">
      ${img ? `<img class="tile-img" src="${img}" alt="${p.title}" loading="lazy">` : '<div class="tile-no-img">No image</div>'}
    </div>
    <div class="tile-info">
      <div class="tile-title">${p.title}</div>
      ${mostPopular ? '<div class="tile-most-popular">Most Popular</div>' : ''}
      ${allSoldOut ? '<div class="tile-oos-label">Sold out</div>' : ''}
    </div>
  </div>`;
}

function renderShop() {
  if (!products.length) {
    document.getElementById('shopSections').innerHTML = '<div class="status-msg">No products found.</div>';
    return;
  }

  // Featured strip
  document.getElementById('featuredGrid').innerHTML = getDailyFeatured().map((p, i) => tileHTML(p, i === 0)).join('');

  // Group products by department, in DEPT_ORDER order
  const byDept = {};
  for (const p of products) {
    const d = p.department || 'Other';
    if (!byDept[d]) byDept[d] = [];
    byDept[d].push(p);
  }
  const depts = Object.keys(byDept).sort((a, b) => {
    const ai = DEPT_ORDER.indexOf(a), bi = DEPT_ORDER.indexOf(b);
    if (ai === -1 && bi === -1) return a.localeCompare(b);
    return (ai === -1 ? 999 : ai) - (bi === -1 ? 999 : bi);
  });

  // Department sections
  document.getElementById('shopSections').innerHTML = depts.map(dept => {
    const id = 'sect-' + dept.toLowerCase().replace(/[\s&()\-]+/g, '-').replace(/-+/g, '-').replace(/^-|-$/g, '');
    return `<div class="dept-section" id="${id}">
      <div class="dept-header">
        <span class="dept-header-name">${dept}</span>
        <span class="dept-header-count">${byDept[dept].length}</span>
      </div>
      <div class="shop-grid">${byDept[dept].map(tileHTML).join('')}</div>
    </div>`;
  }).join('');

  // Sidebar links
  const sidebar = document.getElementById('deptSidebar');
  sidebar.innerHTML =
    `<a class="sidebar-link active" data-section="featuredWrap" href="#featuredWrap">Best Selling</a>` +
    depts.map(dept => {
      const id = 'sect-' + dept.toLowerCase().replace(/[\s&()\-]+/g, '-').replace(/-+/g, '-').replace(/^-|-$/g, '');
      return `<a class="sidebar-link" data-section="${id}" href="#${id}">${dept}</a>`;
    }).join('');

  sidebar.addEventListener('click', e => {
    const a = e.target.closest('.sidebar-link');
    if (!a) return;
    e.preventDefault();
    const el = document.getElementById(a.dataset.section);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  });
}

// Highlight sidebar link matching the section nearest the top of the viewport
function updateActiveSidebarLink() {
  const all = [
    document.getElementById('featuredWrap'),
    ...document.querySelectorAll('.dept-section'),
  ].filter(Boolean);
  let activeId = all[0]?.id;
  for (const el of all) {
    if (el.getBoundingClientRect().top <= 80) activeId = el.id;
  }
  document.querySelectorAll('.sidebar-link').forEach(l =>
    l.classList.toggle('active', l.dataset.section === activeId)
  );
}
window.addEventListener('scroll', updateActiveSidebarLink, { passive: true });

// ── MODAL ─────────────────────────────────────────
let activeProd = null, activeImgs = [], imgIdx = 0, qty = 1, selOpts = {};

function openModal(i) {
  activeProd = products[i];
  activeImgs = activeProd.images.length ? activeProd.images
    : activeProd.featuredImage ? [activeProd.featuredImage] : [];
  imgIdx = 0;
  qty = 1;
  selOpts = {};
  activeProd.options.forEach(o => { selOpts[o.name] = o.values[0]; });

  document.getElementById('modalTitle').textContent = activeProd.title;
  document.getElementById('modalPrice').textContent = money(
    activeProd.priceRange.minVariantPrice.amount,
    activeProd.priceRange.minVariantPrice.currencyCode
  );
  document.getElementById('qtyNum').textContent = 1;
  renderImages();
  renderOpts();
  updateAtcState();
  document.getElementById('productModal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('productModal').classList.remove('open');
  document.body.style.overflow = '';
}

function renderImages() {
  const img  = document.getElementById('modalImg');
  const dots = document.getElementById('imgDots');
  const prev = document.getElementById('imgPrev');
  const next = document.getElementById('imgNext');

  if (activeImgs[imgIdx]) {
    img.src = activeImgs[imgIdx].url;
    img.alt = activeImgs[imgIdx].altText || activeProd.title;
  }
  prev.disabled = imgIdx === 0;
  next.disabled = imgIdx >= activeImgs.length - 1;
  dots.innerHTML = activeImgs.length > 1
    ? activeImgs.map((_, i) => `<button class="modal-dot ${i === imgIdx ? 'on' : ''}" onclick="goImg(${i})"></button>`).join('')
    : '';
}

function goImg(i) { imgIdx = i; renderImages(); }
document.getElementById('imgPrev').onclick = () => { if (imgIdx > 0) goImg(imgIdx - 1); };
document.getElementById('imgNext').onclick = () => { if (imgIdx < activeImgs.length - 1) goImg(imgIdx + 1); };

function activeVariant() {
  return activeProd?.variants.find(v => v.selectedOptions.every(o => selOpts[o.name] === o.value));
}

function renderOpts() {
  const c = document.getElementById('modalOpts');
  const opts = activeProd.options.filter(o => !(o.values.length === 1 && o.name === 'Title'));
  if (!opts.length) { c.innerHTML = ''; return; }

  c.innerHTML = opts.map(opt => {
    const isColor = /colou?r/i.test(opt.name);
    const pills = opt.values.map(val => {
      const test = { ...selOpts, [opt.name]: val };
      const v = activeProd.variants.find(v => v.selectedOptions.every(o => test[o.name] === o.value));
      const oos = v && !v.availableForSale;
      const sel = selOpts[opt.name] === val;
      if (isColor) {
        const hex  = COLOR_HEX[val.toLowerCase()];
        const lite = LIGHT.has(val.toLowerCase());
        return hex
          ? `<button class="color-dot ${sel?'on':''} ${oos?'oos':''} ${lite?'light':''}" style="background:${hex}" title="${val}" onclick="pickOpt('${opt.name}','${val}')"></button>`
          : `<button class="opt-pill ${sel?'on':''} ${oos?'oos':''}" onclick="pickOpt('${opt.name}','${val}')">${val}</button>`;
      }
      return `<button class="opt-pill ${sel?'on':''} ${oos?'oos':''}" onclick="pickOpt('${opt.name}','${val}')">${val}</button>`;
    }).join('');
    return `<div class="opt-group">
      <div class="opt-label">${opt.name} <span class="opt-selected-val">${selOpts[opt.name] || ''}</span></div>
      <div class="opt-pills">${pills}</div>
    </div>`;
  }).join('');
}

function pickOpt(name, val) {
  selOpts[name] = val;
  const v = activeVariant();
  if (v?.image?.url) {
    const fi = activeImgs.findIndex(i => i.url === v.image.url);
    if (fi !== -1) { imgIdx = fi; renderImages(); }
  }
  if (v) document.getElementById('modalPrice').textContent = money(v.price.amount, v.price.currencyCode);
  renderOpts();
  updateAtcState();
}

function updateAtcState() {
  const v    = activeVariant();
  const btn  = document.getElementById('atcBtn');
  const note = document.getElementById('atcNote');
  if (!v || !v.availableForSale) {
    btn.disabled    = true;
    btn.textContent = v ? 'Sold Out' : 'Select options';
    note.textContent = '';
  } else {
    btn.disabled    = false;
    btn.textContent = 'Add to Cart';
    const qty = v.quantityAvailable;
    note.textContent = (qty != null && qty <= 4) ? `Only ${qty} left` : '';
  }
}

document.getElementById('qtyMinus').onclick = () => { if (qty > 1) { qty--; document.getElementById('qtyNum').textContent = qty; } };
document.getElementById('qtyPlus').onclick  = () => { qty++; document.getElementById('qtyNum').textContent = qty; };

document.getElementById('modalClose').onclick = closeModal;
document.getElementById('productModal').addEventListener('click', e => { if (e.target.id === 'productModal') closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ── CART ──────────────────────────────────────────
let cart = null;

const CART_F = `id checkoutUrl note
  discountCodes{code applicable}
  lines(first:20){edges{node{id quantity merchandise{...on ProductVariant{
    id title price{amount currencyCode} image{url} product{title}
  }}}}}
  cost{
    subtotalAmount{amount currencyCode}
    totalTaxAmount{amount currencyCode}
    totalAmount{amount currencyCode}
  }`;

async function cartCreate(variantId, quantity) {
  const { data } = await gql(
    `mutation CartCreate($lines:[CartLineInput!]!){cartCreate(input:{lines:$lines}){cart{${CART_F}}}}`,
    { lines: [{ merchandiseId: variantId, quantity }] }
  );
  return data?.cartCreate?.cart;
}

async function cartAdd(cartId, variantId, quantity) {
  const { data } = await gql(
    `mutation CartAdd($cartId:ID!,$lines:[CartLineInput!]!){cartLinesAdd(cartId:$cartId,lines:$lines){cart{${CART_F}}}}`,
    { cartId, lines: [{ merchandiseId: variantId, quantity }] }
  );
  return data?.cartLinesAdd?.cart;
}

async function cartRemoveLine(cartId, lineId) {
  const { data } = await gql(
    `mutation CartRemove($cartId:ID!,$lineIds:[ID!]!){cartLinesRemove(cartId:$cartId,lineIds:$lineIds){cart{${CART_F}}}}`,
    { cartId, lineIds: [lineId] }
  );
  return data?.cartLinesRemove?.cart;
}

async function cartUpdateLines(cartId, lines) {
  const { data } = await gql(
    `mutation CartUpdate($cartId:ID!,$lines:[CartLineUpdateInput!]!){cartLinesUpdate(cartId:$cartId,lines:$lines){cart{${CART_F}}}}`,
    { cartId, lines }
  );
  return data?.cartLinesUpdate?.cart;
}

async function cartApplyDiscount(cartId, codes) {
  const { data } = await gql(
    `mutation CartDiscount($cartId:ID!,$codes:[String!]!){cartDiscountCodesUpdate(cartId:$cartId,discountCodes:$codes){cart{${CART_F}}}}`,
    { cartId, codes }
  );
  return data?.cartDiscountCodesUpdate?.cart;
}

async function cartUpdateNote(cartId, note) {
  const { data } = await gql(
    `mutation CartNote($cartId:ID!,$note:String!){cartNoteUpdate(cartId:$cartId,note:$note){cart{${CART_F}}}}`,
    { cartId, note }
  );
  return data?.cartNoteUpdate?.cart;
}

function saveCart() { try { localStorage.setItem('srs_cart', JSON.stringify(cart)); } catch(e) {} }
function loadCartFromStorage() {
  try {
    const s = localStorage.getItem('srs_cart');
    if (s) { cart = JSON.parse(s); refreshCartUI(); }
  } catch(e) {}
}

function refreshCartUI(animateBadge = false) {
  const lines = cart?.lines?.edges || [];
  const count = lines.reduce((s, e) => s + e.node.quantity, 0);
  const badge = document.getElementById('cartBadge');
  const prevCount = parseInt(badge.textContent) || 0;
  badge.textContent = count;
  badge.classList.toggle('show', count > 0);
  if (animateBadge && count > prevCount) {
    badge.classList.remove('pop');
    void badge.offsetWidth;
    badge.classList.add('pop');
  }

  const list = document.getElementById('cartList');
  const foot = document.getElementById('cartFoot');

  if (!lines.length) {
    list.innerHTML = '<div class="cart-empty-msg">Your bag is empty.</div>';
    foot.style.display = 'none';
    return;
  }
  foot.style.display = 'block';

  // Note textarea
  const noteEl = document.getElementById('cartNote');
  if (document.activeElement !== noteEl) noteEl.value = cart.note || '';

  // Discount applied row
  const codes   = cart?.discountCodes || [];
  const applied = codes.find(c => c.applicable);
  document.getElementById('discountApplied').style.display = applied ? 'flex' : 'none';
  if (applied) {
    document.getElementById('discountAppliedText').textContent = applied.code + ' applied';
    document.getElementById('discountInput').value = '';
    document.getElementById('discountErr').style.display = 'none';
  }

  list.innerHTML = lines.map(({ node: item }) => {
    const m = item.merchandise;
    const prod = products.find(p => p.title === m.product.title);
    const variants = prod?.variants || [];
    const hasVariants = variants.length > 1 || (variants[0] && variants[0].title !== 'Default Title');
    return `<div class="cart-item">
      <div class="cart-item-img-wrap">
        ${m.image?.url ? `<img class="cart-item-img" src="${m.image.url}" alt="">` : ''}
      </div>
      <div class="cart-item-body">
        <div class="cart-item-head">
          <div class="cart-item-name">${m.product.title}</div>
          <button class="cart-remove" data-line-id="${item.id}" title="Remove">✕</button>
        </div>
        ${hasVariants
          ? `<select class="cart-variant-sel" data-line-id="${item.id}" data-qty="${item.quantity}">
              ${variants.map(v => `<option value="${v.id}"${v.id === m.id ? ' selected' : ''}${!v.availableForSale ? ' disabled' : ''}>${v.title}${!v.availableForSale ? ' — OOS' : ''}</option>`).join('')}
             </select>`
          : (m.title !== 'Default Title' ? `<div class="cart-item-variant">${m.title}</div>` : '')}
        <div class="cart-item-controls">
          <button class="cart-qty-btn" data-line-id="${item.id}" data-delta="-1">−</button>
          <span class="cart-qty-num">${item.quantity}</span>
          <button class="cart-qty-btn" data-line-id="${item.id}" data-delta="1">+</button>
          <div class="cart-item-price">${money(m.price.amount, m.price.currencyCode)}</div>
        </div>
      </div>
    </div>`;
  }).join('');

  const cost   = cart?.cost;
  const sub    = cost?.subtotalAmount;
  const tax    = cost?.totalTaxAmount;
  const tot    = cost?.totalAmount;
  const taxAmt = parseFloat(tax?.amount || 0);
  const subAmt = parseFloat(sub?.amount || 0);
  const totAmt = parseFloat(tot?.amount || 0);

  document.getElementById('cartSubtotal').textContent = sub ? money(sub.amount, sub.currencyCode) : '';

  document.getElementById('cartTaxRow').style.display = taxAmt > 0 ? 'flex' : 'none';
  document.getElementById('cartTax').textContent = taxAmt > 0 ? money(tax.amount, tax.currencyCode) : '';

  const showTotal = Math.abs(totAmt - subAmt) > 0.001;
  document.getElementById('cartTotalRow').style.display = showTotal ? 'flex' : 'none';
  document.getElementById('cartTotal').textContent = tot ? money(tot.amount, tot.currencyCode) : '';

  document.getElementById('checkoutLink').href = cart?.checkoutUrl || '#';
}

document.getElementById('atcBtn').onclick = async () => {
  const v = activeVariant();
  const note = document.getElementById('atcNote');
  const btn  = document.getElementById('atcBtn');
  if (!v) { note.textContent = 'Please select all options.'; return; }
  if (!v.availableForSale) { note.textContent = 'Out of stock.'; return; }

  btn.disabled = true;
  btn.textContent = 'Adding...';
  note.textContent = '';

  try {
    cart = cart?.id
      ? await cartAdd(cart.id, v.id, qty)
      : await cartCreate(v.id, qty);
    saveCart();
    refreshCartUI(true);
    btn.textContent = 'Added!';
    setTimeout(() => { btn.textContent = 'Add to Cart'; btn.disabled = false; }, 1400);
    closeModal();
    openCart();
  } catch(err) {
    btn.textContent = 'Add to Cart';
    btn.disabled = false;
    note.textContent = 'Something went wrong. Try again.';
  }
};

document.getElementById('cartList').addEventListener('click', async e => {
  const removeBtn = e.target.closest('.cart-remove');
  const qtyBtn    = e.target.closest('.cart-qty-btn');
  if (!cart?.id) return;

  if (removeBtn) {
    const lineId = removeBtn.dataset.lineId;
    removeBtn.disabled = true;
    cart = await cartRemoveLine(cart.id, lineId);
    saveCart(); refreshCartUI();
  }

  if (qtyBtn) {
    const lineId = qtyBtn.dataset.lineId;
    const delta  = parseInt(qtyBtn.dataset.delta);
    const line   = cart.lines.edges.find(e => e.node.id === lineId)?.node;
    if (!line) return;
    qtyBtn.disabled = true;
    const newQty = line.quantity + delta;
    cart = newQty <= 0
      ? await cartRemoveLine(cart.id, lineId)
      : await cartUpdateLines(cart.id, [{ id: lineId, quantity: newQty }]);
    saveCart(); refreshCartUI(delta > 0);
  }
});

document.getElementById('cartList').addEventListener('change', async e => {
  const sel = e.target.closest('.cart-variant-sel');
  if (!sel || !cart?.id) return;
  const lineId     = sel.dataset.lineId;
  const qty        = parseInt(sel.dataset.qty);
  const variantId  = sel.value;
  sel.disabled = true;
  cart = await cartUpdateLines(cart.id, [{ id: lineId, merchandiseId: variantId, quantity: qty }]);
  saveCart(); refreshCartUI();
});

function openCart() {
  document.getElementById('cartDrawer').classList.add('open');
  document.getElementById('cartOverlay').classList.add('open');
}
function closeCart() {
  document.getElementById('cartDrawer').classList.remove('open');
  document.getElementById('cartOverlay').classList.remove('open');
}
document.getElementById('cartBtn').onclick     = openCart;
document.getElementById('cartClose').onclick   = closeCart;
document.getElementById('cartOverlay').onclick = closeCart;

// Note auto-save
let noteTimer = null;
document.getElementById('cartNote').addEventListener('input', () => {
  clearTimeout(noteTimer);
  noteTimer = setTimeout(async () => {
    if (!cart?.id) return;
    cart = await cartUpdateNote(cart.id, document.getElementById('cartNote').value);
    saveCart();
  }, 800);
});

// Discount code apply / remove
document.getElementById('discountApply').addEventListener('click', async () => {
  if (!cart?.id) return;
  const code = document.getElementById('discountInput').value.trim();
  if (!code) return;
  const btn = document.getElementById('discountApply');
  btn.disabled = true; btn.textContent = '...';
  cart = await cartApplyDiscount(cart.id, [code]);
  saveCart();
  const ok = cart?.discountCodes?.find(c => c.applicable);
  const errEl = document.getElementById('discountErr');
  if (!ok) { errEl.textContent = 'Code not valid or expired.'; errEl.style.display = 'block'; }
  refreshCartUI();
  btn.disabled = false; btn.textContent = 'Apply';
});

document.getElementById('discountRemove').addEventListener('click', async () => {
  if (!cart?.id) return;
  cart = await cartApplyDiscount(cart.id, []);
  saveCart(); refreshCartUI();
  document.getElementById('discountInput').value = '';
  document.getElementById('discountErr').style.display = 'none';
});

// ── INIT ──────────────────────────────────────────
(async () => {
  try { await fetchProducts(); } catch(e) { console.error(e); }
  renderShop();
  loadCartFromStorage();
})();
</script>
</body>
</html>
