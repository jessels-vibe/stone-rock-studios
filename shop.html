<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop — Stone Rock Studios</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --black: #0a0a0a;
    --surface: #111111;
    --border: #1e1e1e;
    --text: #f0f0f0;
    --muted: #555;
  }
  html { background: var(--black); color: var(--text); font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; -webkit-font-smoothing: antialiased; }
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 32px; height: 52px;
    background: rgba(10,10,10,0.96);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
  }
  .nav-logo { font-weight: 700; font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text); text-decoration: none; }
  .nav-links { display: flex; gap: 40px; align-items: center; }
  .nav-link { font-size: 11px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); text-decoration: none; transition: color 0.2s; }
  .nav-link:hover, .nav-link.active { color: var(--text); }
  .nav-cta { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--black); background: var(--text); padding: 7px 16px; text-decoration: none; transition: opacity 0.2s; }
  .nav-cta:hover { opacity: 0.8; }

  .hero { padding: 120px 36px 48px; }
  .hero-label { font-size: 10px; font-weight: 600; letter-spacing: 0.25em; text-transform: uppercase; color: var(--muted); margin-bottom: 18px; }
  .hero-title { font-weight: 700; font-size: clamp(48px, 7vw, 88px); line-height: 0.92; letter-spacing: -0.03em; color: var(--text); margin-bottom: 14px; }
  .hero-sub { font-size: 13px; font-weight: 300; color: var(--muted); letter-spacing: 0.06em; }

  .shop-wrap { padding: 8px 28px 120px; }

  /* Shopify Buy Button overrides — product cards render in DOM (not iframe) */
  .shopify-buy__product { background: var(--surface) !important; }
  .shopify-buy__product-img-wrapper { background: var(--surface) !important; }
  .shopify-buy__product__title { color: #fefefe !important; font-family: "Helvetica Neue", Helvetica, Arial, sans-serif !important; font-size: 13px !important; font-weight: 600 !important; letter-spacing: 0.01em !important; }
  .shopify-buy__product__actual-price,
  .shopify-buy__product__price { color: #fefefe !important; font-family: "Helvetica Neue", Helvetica, Arial, sans-serif !important; font-size: 12px !important; }
  .shopify-buy__option-select__label,
  .shopify-buy__option-select { color: #fefefe !important; font-family: "Helvetica Neue", Helvetica, Arial, sans-serif !important; }
  .shopify-buy__btn { border-radius: 0 !important; font-family: "Helvetica Neue", Helvetica, Arial, sans-serif !important; letter-spacing: 0.1em !important; text-transform: uppercase !important; font-size: 11px !important; }

  @media (max-width: 768px) {
    nav { padding: 0 20px; }
    .hero { padding: 90px 20px 40px; }
    .shop-wrap { padding: 8px 16px 80px; }
  }
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="index.html">Stone Rock Studios</a>
  <div class="nav-links">
    <a class="nav-link" href="index.html">Work</a>
    <a class="nav-link active" href="shop.html">Shop</a>
    <a class="nav-cta" href="mailto:stonerockstudiosllc@gmail.com">Get in Touch</a>
  </div>
</nav>

<div class="hero">
  <div class="hero-label">Merch</div>
  <div class="hero-title">Stone Rock<br>Studios</div>
  <div class="hero-sub">Wear the brand.</div>
</div>

<div class="shop-wrap">

        ShopifyBuyInit();
      } else {
        loadScript();
      }
    } else {
      loadScript();
    }

      var script = document.createElement('script');
      script.async = true;

      script.onload = ShopifyBuyInit;

                  }
                },

                  "font-family": "Helvetica Neue, Helvetica, Arial, sans-serif",
                  "font-size": "14px",
                  "font-weight": "600"
                },
                "prices": { "color": "#fefefe" },
                "price": {
                  "color": "#fefefe",
                  "font-family": "Helvetica Neue, Helvetica, Arial, sans-serif",
                  "font-size": "13px"
                },
                "button": {
                  "font-family": "Helvetica Neue, Helvetica, Arial, sans-serif",
                  "font-size": "13px",

                  ":hover": { "background-color": "#222222" },

                  "border-radius": "0px",
                  "padding-left": "30px",
                  "padding-right": "30px"

              "text": { "button": "Add to Cart" }

              "styles": {

                    "max-width": "100%",
                    "margin-left": "0px",
                    "margin-bottom": "0px"
                  }
                },
                "button": {
                  "font-family": "Helvetica Neue, Helvetica, Arial, sans-serif",
                  "font-size": "13px",
                  "padding-top": "18px",
                  "padding-bottom": "18px",
                  "letter-spacing": "0.12em",
                  ":hover": { "background-color": "#222222" },
                  "background-color": "#0a0a0a",
                  ":focus": { "background-color": "#222222" },
                  "border-radius": "0px",
                  "padding-left": "30px",
                  "padding-right": "30px"
                }
              },
              "text": { "button": "Add to Cart" }
            },
            "option": {
              "styles": {
                "label": {
                  "color": "#fefefe",
                  "font-family": "Helvetica Neue, Helvetica, Arial, sans-serif",
                  "font-size": "11px",
                  "font-weight": "600",
                  "letter-spacing": "0.1em",
                  "text-transform": "uppercase"
                },
                "select": {
                  "color": "#0a0a0a",
                  "font-family": "Helvetica Neue, Helvetica, Arial, sans-serif"
                }
              }
            },
            "cart": {
              "styles": {
                "button": {

                  "font-size": "11px",

                  "background-color": "#0a0a0a",
                  ":focus": { "background-color": "#222222" },
                  "border-radius": "0px"
                }
              },
              "text": {
                "total": "Subtotal",
                "button": "Checkout"
              }
            },
            "toggle": {
              "styles": {
                "toggle": {
                  "background-color": "#f0f0f0",

                  ":focus": { "background-color": "#cccccc" }
                },
                "count": {

                },

                }
              }
            }
          }
        });
      });
    }
  })();
  </script>
</div>

</body>
</html>
